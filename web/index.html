<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SAE BUT S4 - Application Répartie</title>

        <!-- Importation de leaflet (https://leafletjs.com/examples/quick-start/) -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

        <!-- Notre script JS -->
        <script type="module" src="dist/index.js"></script>

        <!-- Tailwind CDN -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body class="bg-blue-100 w-screen h-screen flex flex-col p-6 box-border">
        <p class="text-xl underline mb-3"><strong>Carte des stations velibs de Nancy :</strong></p>

        <!-- Div dans lequel la carte sera affichée -->
        <div class="flex-1 flex flex-row gap-4">
            <div id="map" class="w-full flex-1 border-4 border-blue-300 rounded-xl shadow-2xl shadow-gray-600"></div>

            <section class="w-1/3 bg-blue-100 rounded-xl p-4 border-4 border-blue-300 shadow-2xl shadow-gray-600" id="filtres">
                <p class="text-lg"><strong>Filtres :</strong></p>

                <input type="checkbox" id="filtre-velib" checked class="mr-2" onchange="updateMap()" />
                <label for="filtre-velib">Afficher les velibs</label><br />

                <input type="checkbox" id="filtre-incident" checked class="mr-2" onchange="updateMap()" />
                <label for="filtre-incident">Afficher les incidents</label><br />

                <input type="checkbox" id="filtre-restaurant" checked class="mr-2" onchange="updateMap()" />
                <label for="filtre-restaurant">Afficher les restaurants</label><br />
            </section>

            <section class="w-1/3 bg-blue-100 rounded-xl p-4 border-4 border-blue-300 shadow-2xl shadow-gray-600" id="reservation-form" style="display: none">
                <p class="text-lg"><strong>Actions</strong></p>

                <div class="flex flex-col gap-y-4 mt-2">
                    <p>Restaurant sélectionné : <strong><span id="restaurant-name"></span></strong></p>

                    <div id="reservation-etape-1" class="bg-white p-4 rounded border border-blue-300 shadow-sm">
                        <p class="font-semibold mb-2">1. Choisissez votre créneau</p>
                        <label class="block mb-2">
                            Nombre de personnes :
                            <input type="number" id="reservation-personnes" class="w-full border rounded px-2 py-1" min="1" value="2" />
                        </label>
                        <label class="block mb-2">
                            Date et heure :
                            <input type="datetime-local" id="reservation-date" class="w-full border rounded px-2 py-1" />
                        </label>
                        <button class="bg-blue-500 text-white px-3 py-1 rounded" type="button" onclick="chercherTablesDispo()">Voir les tables disponibles</button>
                    </div>

                    <div id="reservation-tables" style="display: none;" class="bg-white p-4 rounded border border-blue-300 shadow-sm">
                        <p class="font-semibold mb-2">2. Tables disponibles</p>
                        <div id="liste-tables" class="flex flex-col gap-2"></div>
                    </div>

                    <div id="reservation-details" style="display: none;" class="bg-white p-4 rounded border border-blue-300 shadow-sm">
                        <p class="font-semibold mb-2">3. Réservez la table sélectionnée</p>
                        <p class="mb-2">Table choisie : <strong><span id="table-selectionnee"></span></strong></p>
                        <label class="block mb-2">
                            Prénom du client :
                            <input type="text" id="reservation-prenom" class="w-full border rounded px-2 py-1" placeholder="Votre prénom" />
                        </label>
                        <label class="block mb-2">
                            Nom du client :
                            <input type="text" id="reservation-nom" class="w-full border rounded px-2 py-1" placeholder="Votre nom" />
                        </label>
                        <label class="block mb-2">
                            Téléphone :
                            <input type="tel" id="reservation-phone" class="w-full border rounded px-2 py-1" placeholder="06 00 00 00 00" />
                        </label>
                        <label class="block mb-2">
                            Commentaire :
                            <textarea id="reservation-notes" class="w-full border rounded px-2 py-1" placeholder="Allergies, demandes particulières..."></textarea>
                        </label>
                        <button class="bg-green-500 text-white px-3 py-1 rounded" type="button" onclick="envoyerReservation()">Réserver cette table</button>
                    </div>

                    <button class="bg-blue-200 px-3 py-1 rounded border-2 border-blue-400 cursor-pointer" onclick="cacherActions()">Retourner aux filtres</button>
                </div>
            </section>
        </div>
    </body>
</html>
