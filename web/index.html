<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SAE BUT S4 - Application Répartie</title>

        <!-- Importation de leaflet (https://leafletjs.com/examples/quick-start/) -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

        <!-- Notre script JS -->
        <script type="module" src="dist/index.js"></script>

        <!-- Tailwind CDN -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body class="bg-blue-100 w-screen h-screen flex flex-col p-6 box-border">
        <p class="text-xl underline mb-3"><strong>Carte des stations velibs de Nancy :</strong></p>

        <!-- Div dans lequel la carte sera affichée -->
        <div class="flex-1 flex flex-row gap-4">
            <div id="map" class="w-full flex-1 border-4 border-blue-300 rounded-xl shadow-2xl shadow-gray-600"></div>

            <section class="w-1/3 bg-blue-100 rounded-xl p-4 border-4 border-blue-300 shadow-2xl shadow-gray-600" id="filtres">
                <p class="text-lg"><strong>Filtres :</strong></p>

                <input type="checkbox" id="filtre-velib" checked class="mr-2" onchange="updateMap()" />
                <label for="filtre-velib">Afficher les velibs</label><br />

                <input type="checkbox" id="filtre-incident" checked class="mr-2" onchange="updateMap()" />
                <label for="filtre-incident">Afficher les incidents</label><br />

                <input type="checkbox" id="filtre-restaurant" checked class="mr-2" onchange="updateMap()" />
                <label for="filtre-restaurant">Afficher les restaurants</label><br />

                <input type="checkbox" id="filtre-crous" checked class="mr-2" onchange="updateMap()" />
                <label for="filtre-crous">Afficher les restaurants Crous</label><br />

                <hr class="my-3" />

                <button
                        class="bg-blue-200 px-3 py-1 rounded border-2 border-blue-400 cursor-pointer"
                        onclick="afficherAdminPanel()"
                >
                    Admin panel
                </button>

                <input type="checkbox" id="filtre-points" checked class="mr-2" onchange="updateMap()" />
                <label for="filtre-points">Afficher mes points</label><br />

                <div class="mt-4">
                    <button id="btn-add-point" class="bg-blue-200 px-3 py-1 rounded border-2 border-blue-400 cursor-pointer" onclick="activerAjoutPoint()">Ajouter un point</button>
                </div>
            </section>

            <section class="w-1/3 bg-blue-100 rounded-xl p-4 border-4 border-blue-300 shadow-2xl shadow-gray-600" id="reservation-form" style="display: none">
                <p class="text-lg"><strong>Actions</strong></p>

                <div class="flex flex-col gap-y-4 mt-2">
                    <button
                            class="bg-blue-200 px-3 py-1 rounded border-2 border-blue-400 cursor-pointer"
                            onclick="afficherTablesDisponibles()"
                    >
                        Réserver une table pour le restaurant <span id="restaurant-name"></span>
                    </button>

                    <div id="tables-dispo" class="mt-4 max-h-48 overflow-y-auto border-2 border-blue-300 rounded p-2 hidden"></div>

                    <button class="bg-blue-200 px-3 py-1 rounded border-2 border-blue-400 cursor-pointer" onclick="cacherActions()">Retourner aux filtres</button>
                </div>
            </section>

            <section class="w-1/3 bg-blue-100 rounded-xl p-4 border-4 border-blue-300 shadow-2xl shadow-gray-600 hidden" id="admin-panel">
                <p class="text-lg"><strong>Réservations</strong></p>

                <div id="reservations-list" class="mt-3 max-h-96 overflow-y-auto"></div>

                <button
                        class="bg-gray-200 px-3 py-1 rounded border-2 border-gray-400 mt-3 cursor-pointer"
                        onclick="cacherAdminPanel()"
                >
                    Retour
                </button>
            </section>

            <section class="w-1/3 bg-yellow-50 rounded-xl p-4 border-4 border-yellow-400 shadow-2xl shadow-gray-600 overflow-y-auto" id="menu-crous" style="display: none">
                <p class="text-lg"><strong>Menu CROUS</strong></p>
                <p class="text-md font-semibold mt-1" id="crous-name"></p>
                <p class="text-sm text-gray-500 mb-3">Date: <span id="menu-date"></span></p>

                <pre class="whitespace-pre-wrap font-sans text-sm" id="menu-content"></pre>

                <button class="bg-yellow-200 px-3 py-1 rounded border-2 border-yellow-400 cursor-pointer mt-4" onclick="cacherMenuCrous()">Retourner aux filtres</button>
            </section>

            <section class="w-1/3 bg-green-50 rounded-xl p-4 border-4 border-green-400 shadow-2xl shadow-gray-600 overflow-y-auto" id="add-point-form" style="display: none">
                <p class="text-lg"><strong>Ajouter un point 📍</strong></p>

                <div class="mt-3 p-2 bg-blue-100 rounded border border-blue-300">
                    <p class="text-sm font-semibold">Localisation :</p>
                    <p class="text-sm" id="coords-display">En attente du clic...</p>
                </div>

                <div class="mt-3">
                    <label class="text-sm font-semibold">Choisir un emoji :</label>
                    <div class="flex gap-2 mt-2 flex-wrap">
                        <button class="emoji-btn border-4 border-blue-600 px-3 py-2 rounded text-xl cursor-pointer bg-white" onclick="changeEmoji('📍')">📍</button>
                        <button class="emoji-btn border-2 border-blue-300 px-3 py-2 rounded text-xl cursor-pointer bg-white" onclick="changeEmoji('⭐')">⭐</button>
                        <button class="emoji-btn border-2 border-blue-300 px-3 py-2 rounded text-xl cursor-pointer bg-white" onclick="changeEmoji('🏞️')">🏞️</button>
                        <button class="emoji-btn border-2 border-blue-300 px-3 py-2 rounded text-xl cursor-pointer bg-white" onclick="changeEmoji('🌲')">🌲</button>
                        <button class="emoji-btn border-2 border-blue-300 px-3 py-2 rounded text-xl cursor-pointer bg-white" onclick="changeEmoji('🎣')">🎣</button>
                        <button class="emoji-btn border-2 border-blue-300 px-3 py-2 rounded text-xl cursor-pointer bg-white" onclick="changeEmoji('📸')">📸</button>
                    </div>
                </div>

                <div class="mt-3">
                    <label for="point-titre" class="text-sm font-semibold">Titre :</label>
                    <input type="text" id="point-titre" class="w-full px-2 py-1 border border-gray-300 rounded mt-1" placeholder="Entrez un titre" />
                </div>

                <div class="mt-3">
                    <label for="point-description" class="text-sm font-semibold">Description :</label>
                    <textarea id="point-description" class="w-full px-2 py-1 border border-gray-300 rounded mt-1 h-20" placeholder="Entrez une description (optionnel)"></textarea>
                </div>

                <div class="flex gap-2 mt-4">
                    <button class="bg-green-200 px-3 py-1 rounded border-2 border-green-400 cursor-pointer flex-1" onclick="validerAjoutPoint()">Ajouter 👍</button>
                    <button class="bg-red-200 px-3 py-1 rounded border-2 border-red-400 cursor-pointer flex-1" onclick="activerAjoutPoint(); afficherPanneau('filtres')">Annuler ❌</button>
                </div>
            </section>
        </div>
    </body>
</html>
